name: Fetch ACLED Africa Data
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Validate required ACLED secrets
        env:
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
        run: |
          if [ -z "$ACLED_EMAIL" ] || [ -z "$ACLED_PASSWORD" ]; then
            echo "Missing required repository secrets: ACLED_EMAIL and/or ACLED_PASSWORD"
            echo "Set them in Settings > Secrets and variables > Actions"
            exit 1
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Africa ACLED fetch script
        env:
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
        run: python3 _scripts/fetch_acled_africa_data.py
      - name: Commit output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/acled_africa_data.json
          git diff --cached --quiet || git commit -m "Update ACLED Africa data"
          git push
