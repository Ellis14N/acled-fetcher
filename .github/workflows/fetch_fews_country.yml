name: "Fetch FEWS Country Snapshot"

"on":
  workflow_dispatch:
    inputs:
      country:
        description: "Country to fetch FEWS current and projected food security data for"
        required: true
        default: "Chad"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate required FEWS secrets
        env:
          FEWS_USERNAME: ${{ secrets.FEWS_username }}
          FEWS_PASSWORD: ${{ secrets.FEWS_password }}
        run: |
          if [ -z "$(printf '%s' "$FEWS_USERNAME" | tr -d '[:space:]')" ] || [ -z "$(printf '%s' "$FEWS_PASSWORD" | tr -d '[:space:]')" ]; then
            echo "Missing required repository secrets: FEWS_username and/or FEWS_password"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FEWS country snapshot script
        env:
          FEWS_USERNAME: ${{ secrets.FEWS_username }}
          FEWS_PASSWORD: ${{ secrets.FEWS_password }}
        run: python3 -u _scripts/fetch_fews_country_snapshot.py "${{ github.event.inputs.country }}"

      - name: Commit FEWS snapshot output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fews_snapshot_*.json
          git diff --cached --quiet || git commit -m "Update FEWS snapshot: ${{ github.event.inputs.country }}"
          git push