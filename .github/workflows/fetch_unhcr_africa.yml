name: Fetch UNHCR Africa Data
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Africa UNHCR fetch script
        run: python3 _scripts/fetch_unhcr_africa_data.py
      - name: Commit output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/unhcr_africa_data.json
          git diff --cached --quiet || git commit -m "Update UNHCR Africa data"
          git push
