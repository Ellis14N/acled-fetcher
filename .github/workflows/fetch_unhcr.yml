name: Fetch UNHCR Data

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country to fetch displacement data for"
        required: true
        default: "Mali"

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run UNHCR fetch script
        run: python3 _scripts/fetch_unhcr_data.py "${{ github.event.inputs.country }}"

      - name: Commit output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update UNHCR data: ${{ github.event.inputs.country }}"
          git push
