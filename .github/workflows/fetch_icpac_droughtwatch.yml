name: Refresh ICPAC Drought Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ICPAC drought snapshot
        run: python3 _scripts/fetch_icpac_droughtwatch_snapshot.py

      - name: Commit output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/icpac_droughtwatch_snapshot.json
          git diff --cached --quiet || git commit -m "Update ICPAC drought snapshot"
          git push
